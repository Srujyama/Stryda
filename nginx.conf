server {
    listen 8080 default_server;
    server_name stryda.ai www.stryda.ai _;

    root /usr/share/nginx/html;
    index index.html;

    # Behind Cloudflare + ALB — both terminate TLS. Don't emit redirects
    # with origin scheme/port (would send http:// back through Cloudflare
    # and trip 522). Resolve trailing-slash directories internally instead.
    absolute_redirect off;
    port_in_redirect off;

    # Astro emits hashed assets under /assets — cache hard.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static files (favicon, robots, sitemap) — short cache.
    location = /favicon.svg { expires 7d; }
    location = /robots.txt  { expires 1d; }
    location ~ ^/sitemap.*\.xml$ { expires 1d; }

    # Astro builds /<page>/index.html for each page; try the URL,
    # then the URL with .html, then the URL's index.html, finally 404.
    # Note: $uri/index.html avoids nginx's directory-redirect entirely
    # (an external 301 would loop through Cloudflare and trip 522).
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Custom 404 if Astro produced one.
    error_page 404 /404.html;

    # Block access to dotfiles.
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
